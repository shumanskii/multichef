<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SCRAEGG Pro — Отправка приглашения</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
<script>emailjs.init('WaBE7_3-Wn8sPWpHr');</script>
<style>
:root {
  --gold: #C8A84B;
  --dark: #1A1A1A;
  --muted: rgba(26,26,26,0.55);
  --border: #E8E2D6;
  --white: #FAFAF8;
  --gray: #F4F2EE;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'Inter', sans-serif;
  background: var(--gray);
  padding: 40px 24px;
  min-height: 100vh;
}
.wrap { max-width: 480px; margin: 0 auto; }
h1 {
  font-size: 28px; font-weight: 700;
  color: var(--dark); margin-bottom: 8px;
}
.subtitle {
  font-size: 16px; color: var(--muted);
  margin-bottom: 36px;
}
.form-box {
  background: var(--white);
  border-radius: 20px;
  padding: 40px;
  border: 1px solid var(--border);
  box-shadow: 0 12px 40px rgba(0,0,0,0.06);
}
.form-group { margin-bottom: 20px; }
.form-group label {
  display: block;
  font-size: 13px; font-weight: 600;
  color: var(--dark);
  margin-bottom: 8px;
  letter-spacing: 0.03em;
  text-transform: uppercase;
}
.form-group input {
  width: 100%;
  padding: 14px 16px;
  border: 1.5px solid var(--border);
  border-radius: 8px;
  font-family: 'Inter', sans-serif;
  font-size: 15px;
  color: var(--dark);
  background: var(--white);
  transition: border-color 0.2s;
  outline: none;
}
.form-group input:focus {
  border-color: var(--gold);
  box-shadow: 0 0 0 3px rgba(200,168,75,0.12);
}
.btn-send {
  width: 100%;
  background: var(--gold);
  color: var(--dark);
  font-family: 'Inter', sans-serif;
  font-size: 16px;
  font-weight: 600;
  padding: 16px 24px;
  border-radius: 8px;
  border: none;
  cursor: pointer;
  transition: all 0.2s;
  margin-top: 10px;
}
.btn-send:hover { opacity: 0.88; transform: translateY(-2px); }
.btn-send:disabled { opacity: 0.5; cursor: not-allowed; }
.status-msg {
  font-size: 14px;
  padding: 12px;
  border-radius: 8px;
  margin-top: 12px;
  display: none;
}
.status-msg.success {
  background: rgba(34, 197, 94, 0.1);
  color: #22c55e;
  border: 1px solid rgba(34, 197, 94, 0.2);
  display: block;
}
.status-msg.error {
  background: rgba(239, 68, 68, 0.1);
  color: #ef4444;
  border: 1px solid rgba(239, 68, 68, 0.2);
  display: block;
}
</style>
</head>
<body>
 
<div class="wrap">
  <h1>📧 Отправить приглашение</h1>
  <p class="subtitle">Отправьте приглашение на встречу владельцу ресторана</p>
 
  <div class="form-box">
    <form id="inviteForm">
      <div class="form-group">
        <label for="owner_name">Имя владельца / менеджера</label>
        <input type="text" id="owner_name" name="owner_name" placeholder="Иван Иванов" required>
      </div>
 
      <div class="form-group">
        <label for="owner_email">Email адрес</label>
        <input type="email" id="owner_email" name="owner_email" placeholder="owner@restaurant.cz" required>
      </div>
 
      <button type="submit" class="btn-send">Отправить приглашение</button>
      <div id="status" class="status-msg"></div>
    </form>
  </div>
</div>
 
<script>
const form = document.getElementById('inviteForm');
const statusMsg = document.getElementById('status');
 
form.addEventListener('submit', async (e) => {
  e.preventDefault();
 
  const owner = document.getElementById('owner_name').value;
  const email = document.getElementById('owner_email').value;
 
  statusMsg.textContent = '⏳ Отправляю...';
  statusMsg.className = 'status-msg';
  statusMsg.style.display = 'block';
 
  try {
    await emailjs.send('Nata.shumanska', 'template_hm8km7l', {
      to_email: email,
      owner_name: owner
    });
 
    statusMsg.textContent = '✅ Письмо успешно отправлено!';
    statusMsg.className = 'status-msg success';
    form.reset();
 
    setTimeout(() => {
      statusMsg.style.display = 'none';
    }, 5000);
  } catch (error) {
    console.error('EmailJS error:', error);
    statusMsg.textContent = '❌ Ошибка отправки. Проверьте консоль.';
    statusMsg.className = 'status-msg error';
  }
});
</script>
 
</body>
</html>
